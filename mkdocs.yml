site_name: StreamXfer Documentation
site_description: "High-performance SQL Server data export tool built in Rust. Stream data to local or cloud storage in Parquet, CSV, TSV, or JSON."
site_url: https://zhiweio.github.io/StreamXfer/
repo_name: zhiweio/StreamXfer
repo_url: https://github.com/zhiweio/StreamXfer
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zhiweio/StreamXfer
      name: GitHub Repository
  generator: false

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - CLI Reference: guide/cli-reference.md
      - Configuration: guide/configuration.md
      - Storage Targets: guide/storage.md
      - Checkpoint & Resume: guide/checkpoint.md
      - Python Bindings: guide/python-bindings.md
  - Architecture:
      - Overview: architecture/overview.md
      - Data Pipeline: architecture/pipeline.md
  - Development:
      - Contributing: development/contributing.md
      - Local Testing: development/local-testing.md
